name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          name = project["name"]
          version = project["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if name != "edstem-cli":
              raise SystemExit(f"Refusing to release unexpected package name: {name}")
          if tag != expected:
              raise SystemExit(f"Tag {tag} does not match package version {expected}")
          print(f"Validated release tag {tag} for {name}")
          PY

      - name: Build package
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Prepare release notes
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"(?ms)^## {re.escape(version)} - [^\n]*\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog)
          if match is None:
              raise SystemExit(f"Could not find release notes for version {version} in CHANGELOG.md")
          body = match.group(1).strip()
          if not body:
              raise SystemExit(f"Release notes for version {version} are empty")
          pathlib.Path("dist/release-notes.md").write_text(body + "\n", encoding="utf-8")
          print(f"Prepared release notes for {version}")
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/edstem-cli/
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.whl
          fail_on_unmatched_files: true
